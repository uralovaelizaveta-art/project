<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Движение — Справочник</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/pages.css">
  <link rel="stylesheet" href="../styles/responsive.css">
  <style>
    .movement-detail { max-width: 900px; margin: 0 auto; }
    .movement-header { display: grid; grid-template-columns: 1fr auto; gap: 2rem; margin-bottom: 2rem; background: white; padding: 2rem; border-radius: 8px; border: 1px solid #eee; align-items: start; }
    .movement-title-block h1 { margin: 0 0 0.5rem 0; font-size: 2rem; }
    .movement-subtitle { font-size: 1.1rem; color: #666; font-style: italic; margin: 0; }
    .movement-category-badge { display: inline-block; background: #f6f0e8; color: #c79a5a; padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; margin-top: 1rem; }
    .movement-actions { display: flex; gap: 0.5rem; flex-direction: column; }
    .movement-btn { padding: 0.75rem 1rem; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; }
    .movement-btn:hover { background: #f9f9f9; border-color: #999; }
    .content-section { background: white; padding: 2rem; border-radius: 8px; border: 1px solid #eee; margin-bottom: 1.5rem; }
    .content-section h2 { margin-top: 0; margin-bottom: 1rem; color: #333; border-bottom: 2px solid #c79a5a; padding-bottom: 0.5rem; }
    .content-section p { line-height: 1.6; color: #555; }
    .movement-image { width: 100%; max-height: 300px; object-fit: cover; border-radius: 8px; margin-bottom: 1rem; }
    .tags-list { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
    .tag { background: #f0f0f0; padding: 0.4rem 0.8rem; border-radius: 4px; font-size: 0.85rem; color: #666; }
    .back-link { display: inline-block; margin-bottom: 1.5rem; padding: 0.5rem 1rem; color: #c79a5a; text-decoration: none; border: 1px solid #c79a5a; border-radius: 4px; transition: all 0.2s; }
    .back-link:hover { background: #c79a5a; color: white; }
    @media (max-width: 768px) {
      .movement-header { grid-template-columns: 1fr; }
      .movement-actions { flex-direction: row; }
      .movement-title-block h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body data-root="page" data-page="movement">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo-area" title="На главную">
        <div class="logo-mark">KT</div>
        <div class="logo-text">
          <span class="site-title">Классический танец</span>
          <span class="site-subtitle">Справочник движений</span>
        </div>
      </a>
      <div class="header-controls">
        <button class="icon-button menu-toggle" id="menuToggle" type="button" aria-label="Открыть меню">
          <span class="icon-arrow"></span>
        </button>
      </div>
    </div>
  </header>

  <aside class="sidebar" id="sidebar" aria-hidden="true">
    <nav class="sidebar-nav" id="sidebarNav">
      <a href="../index.html" class="sidebar-link" data-page-link="home">Главная</a>
      <a href="search.html" class="sidebar-link" data-page-link="search">Поиск</a>
      <a href="alphabet.html" class="sidebar-link" data-page-link="alphabet">Алфавитный указатель</a>
    </nav>
  </aside>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <main class="page">
    <a href="alphabet.html" class="back-link">← Вернуться к указателю</a>

    <div class="movement-detail" id="movementDetail">
      <div class="movement-header">
        <div class="movement-title-block">
          <h1 id="movementName">Загрузка...</h1>
          <p class="movement-subtitle" id="movementFrench"></p>
          <div class="movement-category-badge" id="movementCategory"></div>
          <div class="tags-list" id="tagsList"></div>
        </div>
        <div class="movement-actions">
          <button class="movement-btn" id="favoriteBtn">♥ В избранное</button>
        </div>
      </div>

      <div class="content-section" id="descriptionSection">
        <h2>Описание</h2>
        <p id="description"></p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-column">
        <h3 class="footer-title">Контакты разработчика</h3>
        <p>E-mail: <a href="mailto:uralova.elizaveta@lit1533.ru">uralova.elizaveta@lit1533.ru</a></p>
      </div>
    </div>
  </footer>

  <script src="../scripts/app.js"></script>
  <script src="../scripts/ui.js"></script>
  <script src="../scripts/router.js"></script>
  <script src="../scripts/api.js"></script>
  <script src="../scripts/auth.js"></script>
  <script src="../scripts/movement.js"></script>
</body>
</html>
