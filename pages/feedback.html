<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Связаться с нами — Справочник</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/pages.css">
  <link rel="stylesheet" href="../styles/responsive.css">
</head>
<body data-root="page" data-page="feedback">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo-area" title="На главную">
        <div class="logo-mark">KT</div>
        <div class="logo-text">
          <span class="site-title">Классический танец</span>
          <span class="site-subtitle">Справочник движений</span>
        </div>
      </a>
      <div class="header-controls">
        <button class="icon-button menu-toggle" id="menuToggle" type="button" aria-label="Открыть меню">
          <span class="icon-arrow"></span>
        </button>
        <form class="header-search" id="headerSearchForm">
          <input
            type="search"
            id="headerSearchInput"
            class="input"
            placeholder="Быстрый поиск движения..."
            aria-label="Быстрый поиск движения"
          >
          <button type="submit" class="btn btn-primary">Найти</button>
        </form>
        <button
          id="accountButton"
          class="btn btn-outline account-button"
          type="button"
          title="Вход/Регистрация"
        >
          Вход/Регистрация
        </button>
      </div>
    </div>
  </header>

  <aside class="sidebar" id="sidebar" aria-hidden="true">
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <main class="page">
    <section class="feedback-page-main">
      <div>
        <h1>Связаться с нами</h1>
        <p>Если вы нашли ошибку или хотите предложить новые материалы, напишите разработчику.</p>
        <div class="card">
          <h2>Контактные данные</h2>
          <p><strong>Почта:</strong> <a href="mailto:qwerty@example.com">qwerty@example.com</a></p>
          <p><strong>Telegram-бот:</strong> <a href="https://t.me/dance_guide_bot" target="_blank" rel="noopener">t.me/dance_guide_bot</a></p>
        </div>
      </div>

      <div class="card">
        <h2>Форма обратной связи</h2>
        <form id="feedbackForm">
          <div class="auth-form-group">
            <label for="feedbackSubject">Тема сообщения</label>
            <input id="feedbackSubject" class="input" placeholder="Например: предложение нового движения">
          </div>
          <div class="auth-form-group">
            <label for="feedbackMessage">Сообщение</label>
            <textarea id="feedbackMessage" class="textarea" rows="4" placeholder="Опишите вашу идею или проблему"></textarea>
          </div>
          <div class="auth-form-group">
            <label for="feedbackContact">Как с вами связаться (почта или ник)</label>
            <input id="feedbackContact" class="input" placeholder="example@mail.ru или @ник">
          </div>
          <button type="submit" class="btn btn-primary">Отправить</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-column">
        <h3 class="footer-title">Контакты разработчика</h3>
        <p>E-mail: <a href="mailto:qwerty@example.com">qwerty@example.com</a></p>
      </div>
      <div class="footer-column">
        <form id="footerFeedbackForm" class="footer-feedback-form">
          <label for="footerFeedbackMessage" class="footer-label">
            Если вы заметили ошибку или хотите что-то добавить, напишите об этом здесь:
          </label>
          <textarea
            id="footerFeedbackMessage"
            class="textarea"
            rows="3"
            placeholder="Ваше сообщение"
          ></textarea>
          <button type="submit" class="btn btn-secondary">Отправить</button>
        </form>
      </div>
    </div>
  </footer>

  <script src="../scripts/app.js"></script>
  <script src="../scripts/ui.js"></script>
  <script src="../scripts/router.js"></script>
  <script src="../scripts/auth.js"></script>
</body>
</html>
