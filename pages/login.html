<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход и регистрация — Справочник движений</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/pages.css">
</head>
<body class="login-page" data-root="page" data-page="login">
  <main class="auth-card">
    <h1>Добро пожаловать</h1>
    <p class="auth-toggle">
      <button type="button" id="showLogin" class="btn btn-ghost">Вход</button>
      <button type="button" id="showRegister" class="btn btn-ghost">Регистрация</button>
    </p>

    <section id="loginSection">
      <h2 style="font-size:1.1rem;margin-bottom:0.6rem;">Вход</h2>
      <form id="loginForm">
        <div class="auth-form-group">
          <label for="loginLogin">Логин</label>
          <input id="loginLogin" class="input" required>
        </div>
        <div class="auth-form-group">
          <label for="loginPassword">Пароль</label>
          <input id="loginPassword" class="input" type="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Войти</button>
        <div class="auth-error" id="loginError" aria-live="polite"></div>
      </form>
    </section>

    <section id="registerSection" style="display:none;">
      <h2 style="font-size:1.1rem;margin-bottom:0.6rem;">Регистрация</h2>
      <form id="registerForm">
        <div class="auth-form-group">
          <label for="regLogin">Логин</label>
          <input id="regLogin" class="input" required>
        </div>
        <div class="auth-form-group">
          <label for="regPassword">Пароль</label>
          <input id="regPassword" class="input" type="password" required minlength="4">
        </div>
        <div class="auth-form-group">
          <label for="regEmail">Электронная почта</label>
          <input id="regEmail" class="input" type="email" required>
        </div>
        <div class="auth-form-group">
          <label for="regName">Имя пользователя</label>
          <input id="regName" class="input" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Зарегистрироваться</button>
        <div class="auth-error" id="registerError" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script src="../scripts/app.js"></script>
  <script src="../scripts/auth.js"></script>
</body>
</html>
