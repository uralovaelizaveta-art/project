<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Алфавитный указатель — Справочник</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/pages.css">
  <link rel="stylesheet" href="../styles/responsive.css">
  <style>
    .page-alphabet-filters {
      display: grid;
      gap: 1.5rem;
      margin-bottom: 2rem;
      background: white;
      padding: 1.5rem;
      border-radius: 8px;
      border: 1px solid #eee;
    }

    .tag {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 0.5rem;
    }

    .pill-toggle-group {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .pill-toggle {
      padding: 0.5rem 1rem;
      border: 1px solid #ddd;
      background: white;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }

    .pill-toggle:hover {
      border-color: #c79a5a;
      color: #c79a5a;
    }

    .pill-toggle.active {
      background: #c79a5a;
      color: white;
      border-color: #c79a5a;
    }

    .alphabet-list-section {
      display: grid;
      gap: 2rem;
    }

    .alphabet-letter-section {
      display: grid;
      gap: 1rem;
    }

    .alphabet-letter {
      font-size: 1.5rem;
      font-weight: 700;
      color: #333;
      padding: 1rem 0 0.5rem 0;
      border-bottom: 2px solid #c79a5a;
      margin: 0;
    }

    #alphabetList {
      display: grid;
      gap: 2rem;
    }

    .movement-card {
      background: white;
      border: 1px solid #eee;
      border-radius: 8px;
      transition: all 0.2s;
      overflow: hidden;
    }

    .movement-card:hover {
      border-color: #c79a5a;
      box-shadow: 0 4px 12px rgba(199, 154, 90, 0.1);
      transform: translateY(-2px);
    }

    .movement-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .movement-card-content {
      padding: 1.25rem;
    }

    .movement-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #333;
      margin: 0 0 0.5rem 0;
    }

    .movement-category {
      font-size: 0.85rem;
      color: #999;
      margin: 0;
    }

    @media (max-width: 768px) {
      .page-alphabet-filters {
        grid-template-columns: 1fr;
      }

      .pill-toggle {
        font-size: 0.85rem;
        padding: 0.4rem 0.8rem;
      }
    }
  </style>
</head>
<body data-root="page" data-page="alphabet">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo-area" title="На главную">
        <div class="logo-mark">KT</div>
        <div class="logo-text">
          <span class="site-title">Классический танец</span>
          <span class="site-subtitle">Справочник движений</span>
        </div>
      </a>
      <div class="header-controls">
        <button class="icon-button menu-toggle" id="menuToggle" type="button" aria-label="Открыть меню">
          <span class="icon-arrow"></span>
        </button>
        <form class="header-search" id="headerSearchForm" autocomplete="off">
          <input
            type="search"
            id="headerSearchInput"
            class="input"
            placeholder="Быстрый поиск движения..."
            aria-label="Быстрый поиск движения"
          >
          <button type="submit" class="btn btn-primary">Найти</button>
        </form>
      </div>
    </div>
  </header>

  <aside class="sidebar" id="sidebar" aria-hidden="true">
    <nav class="sidebar-nav" id="sidebarNav">
      <a href="../index.html" class="sidebar-link" data-page-link="home">Главная</a>
      <a href="search.html" class="sidebar-link" data-page-link="search">Поиск</a>
      <a href="alphabet.html" class="sidebar-link" data-page-link="alphabet">Алфавитный указатель</a>
    
      <!-- <a href="settings.html" class="sidebar-link" data-page-link="site-settings">Настройки сайта</a> -->

    </nav>
  </aside>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <main class="page">
    <h1>Алфавитный указатель движений</h1>

    <section class="page-alphabet-filters">
      <div>
        <div class="tag">Язык</div>
        <div class="pill-toggle-group">
          <button class="pill-toggle active" data-lang-filter="both">Оба</button>
          <button class="pill-toggle" data-lang-filter="ru">Русский</button>
          <button class="pill-toggle" data-lang-filter="fr">Французский</button>
        </div>
      </div>

      <div>
        <div class="tag">Порядок</div>
        <div class="pill-toggle-group">
          <button class="pill-toggle active" data-sort="asc">По алфавиту ↑</button>
          <button class="pill-toggle" data-sort="desc">По алфавиту ↓</button>
          <button class="pill-toggle" data-sort="recent">Недавние</button>
        </div>
      </div>

      <div>
        <div class="tag">Категория</div>
        <div class="pill-toggle-group">
          <button class="pill-toggle active" data-category="all">Все</button>
          <button class="pill-toggle" data-category="positions">Позиции ног</button>
          <button class="pill-toggle" data-category="basic">Базовые движения</button>
          <button class="pill-toggle" data-category="jumps">Прыжки</button>
        </div>
      </div>
    </section>

    <section class="alphabet-list-section">
      <div id="alphabetList">

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-column">
        <h3 class="footer-title">Контакты разработчика</h3>
        <p>E-mail: <a href="mailto:uralova.elizaveta@lit1533.ru">uralova.elizaveta@lit1533.ru</a></p>
      </div>
      <div class="footer-column">
        <form id="footerFeedbackForm" class="footer-feedback-form">
          <label for="footerFeedbackMessage" class="footer-label">
            Если вы заметили ошибку или хотите что-то добавить, напишите об этом здесь:
          </label>
          <textarea
            id="footerFeedbackMessage"
            class="textarea"
            rows="3"
            placeholder="Ваше сообщение"
          ></textarea>
          <button type="submit" class="btn btn-secondary">Отправить</button>
        </form>
      </div>
    </div>
  </footer>

  <script src="../scripts/app.js"></script>
  <script src="../scripts/ui.js"></script>
  <script src="../scripts/router.js"></script>
  <script src="../scripts/api.js"></script>
  <script src="../scripts/auth.js"></script>
  <script src="../scripts/alphabet.js"></script>
</body>
</html>
