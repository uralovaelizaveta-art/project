<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Классический танец</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    
    <header class="header">
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Искать...">
            <button onclick="performSearch()">Найти</button>
        </div>
        
        <nav class="profile-menu">
            <a href="#">Вход/Регистрация</a>
            <a href="#">Избранные движения</a>
            <a href="#">Настройки</a>
        </nav>
    </header>

    <filter class="filter">
        <ul>Сортировать по:

            <li><a><button name = lang_rus>Русский</button></a></li>
            <li><button name = lang_fr>Французкий</button></li>
            <li><button name = alf>Алфавит</button></li>
        </ul>
        
    </filter>
    <main class="content-area">
        <section class="movement-list">
            <h2>Движения:</h2>
            <ul id="movements">
                <li data-level="1"><span>Grand Battement</span></li>
                <li data-level="2"><span>Pirouette</span></li>
                <li data-level="3"><span>Arabesque</span></li>
                <li data-level="4"><span>Entrechat Quatre</span></li>
                <li data-level="5"><span>Fouetté</span></li>
            </ul>
        </section>
        
        <section class="detail-view" style="display:none;">
            <h2>Подробнее о движении:</h2>
            <p><strong>Название:</strong> Grand Battement</p>
            <p>Описание: Широкий мах ногой.</p>
            <p>Источник: Энциклопедия классического танца.</p>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
